


<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de Livraison</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}
h1{
    text-align:center;
    margin-bottom:25px;
}
.info{
    background:#f8f8f8;
    padding:15px;
    border-radius:10px;
    margin-bottom:25px;
}
.info p{
    margin:8px 0;
}
.timeline{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
    position:relative;
}
.timeline::before{
    content:"";
    position:absolute;
    top:20px;
    left:10%;
    width:80%;
    height:4px;
    background:#ddd;
}
.step{
    text-align:center;
    position:relative;
    z-index:2;
}
.circle{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#27ae60;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-weight:bold;
}
.pending{
    background:#bbb;
}
.status{
    margin-top:10px;
    font-size:14px;
}
button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>🚚 Suivi de Livraison</h1>
<div class="info">
<p><strong>Commande :</strong> #FM2026001</p>
<p><strong>Client :</strong> Jean Dupont</p>
<p><strong>Ville :</strong> Kinshasa</p>
<p><strong>Adresse :</strong> Gombe, Avenue du Port</p>
<p><strong>Total :</strong> 160$</p>
</div>
<div class="timeline">
<div class="step">
<div class="circle">✓</div>
<div class="status">Commande reçue</div>
</div>
<div class="step">
<div class="circle">✓</div>
<div class="status">Paiement validé</div>
</div>
<div class="step">
<div class="circle pending">3</div>
<div class="status">En préparation</div>
</div>
<div class="step">
<div class="circle pending">4</div>
<div class="status">Expédiée</div>
</div>
<div class="step">
<div class="circle pending">5</div>
<div class="status">Livrée</div>
</div>
</div>
<button onclick="alert('Le livreur vous contactera bientôt.')">
Contacter le livreur
</button>
</div>
</body>
</html>
