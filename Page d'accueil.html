<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fashion Market</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

/* HEADER */
header{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

button{
    width:100%;
    padding:10px;
    background:#111;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>Fashion Market</h2>
<nav>
<a href="#">Accueil</a>
<a href="register.html">Inscription</a>
<a href="login.html">Connexion</a>
</nav>
</header>

<section class="hero">
<h1>Bienvenue sur la Marketplace</h1>
<p>Découvrez les meilleures tendances de mode</p>
</section>

<section class="products" id="products"></section>

<script>
const products = [
{
name:"Robe élégante",
img:"WhatsApp Image 2026-06-24 at 01.50.56.jpeg"
},
{
name:"Chaussures mode",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},
{
name:"Sac à main",
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"
}
];

let container = document.getElementById("products");

products.forEach(p=>{
container.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.price}$</p>
<button>Ajouter au panier</button>
</div>
</div>
`;
});
</script>

</body>
</html>
