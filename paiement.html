


<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Fashion Market Africa</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}
h1{
    text-align:center;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
}
.section-title{
    margin:20px 0 10px;
    font-size:20px;
    font-weight:bold;
}
.payments{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}
.payment-card{
    border:2px solid #ddd;
    border-radius:12px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}
.payment-card:hover{
    border-color:#27ae60;
    transform:translateY(-3px);
}
.payment-card input{
    margin-bottom:10px;
}
.payment-card img{
    width:80px;
    height:80px;
    object-fit:contain;
}
.total{
    text-align:center;
    font-size:24px;
    color:#27ae60;
    font-weight:bold;
    margin-top:20px;
}
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    background:#111;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>
<body>
<div class="container">
<h1>📦 Finaliser la commande</h1>
<input type="text" id="nom" placeholder="Nom complet">
<input type="tel" id="telephone"
placeholder="+243 XXX XXX XXX">
<input type="text" id="ville"
placeholder="Ville">
<textarea id="adresse"
placeholder="Adresse de livraison"></textarea>
<div class="section-title">
Choisissez votre mode de paiement
</div>
<div class="payments">
<label class="payment-card">
<input type="radio" name="paiement" value="M-Pesa">
<img src="téléchargement.png">
<p>M-Pesa</p>
</label>
<label class="payment-card">
<input type="radio" name="paiement" value="Orange Money">
<img src="téléchargement (1).png">
<p>Orange Money</p>
</label>
<label class="payment-card">
<input type="radio" name="paiement" value="Airtel Money">
<img src="téléchargement (2).png">
<p>Airtel Money</p>
</label>
<label class="payment-card">
<input type="radio" name="paiement" value="Equity Bank">
<img src="téléchargement (3).png">
<p>Equity Bank</p>
</label>
<label class="payment-card">
<input type="radio" name="paiement" value="Carte Bancaire">
<img src="téléchargement (4).png">
<p>Visa / Mastercard</p>
</label>
</div>
<div class="total" id="total">
Total : 160$
</div>
<button onclick="confirmerCommande()">
Confirmer et payer
</button>
</div>
<script>
function confirmerCommande(){
let nom =
document.getElementById("nom").value;
let telephone =
document.getElementById("telephone").value;
let ville =
document.getElementById("ville").value;
let adresse =
document.getElementById("adresse").value;
let paiement =
document.querySelector(
'input[name="paiement"]:checked'
);
if(
!nom ||
!telephone ||
!ville ||
!adresse ||
!paiement
){
alert("Veuillez remplir tous les champs.");
return;
}
alert(
"Commande confirmée !\n" +
"Paiement : " + paiement.value
);
}
</script>
</body>
</html>
