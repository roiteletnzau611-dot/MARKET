<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Marketplace</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.box{
    background:white;
    width:380px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:15px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

/* PROFILE PREVIEW */
.profile-preview{
    text-align:center;
    margin-bottom:10px;
}

.profile-preview img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #111;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#111;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* MESSAGE */
#msg{
    text-align:center;
    margin-top:10px;
    color:green;
}
</style>
</head>

<body>

<div class="box">

<h2>Créer un compte</h2>

<!-- PREVIEW PROFILE -->
<div class="profile-preview">
<img id="preview" src="https://via.placeholder.com/80">
</div>

<input type="file" id="photo" accept="image/*" onchange="loadImage(event)">
<input type="text" id="nom" placeholder="Nom complet">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<select id="role">
<option value="">Choisir rôle</option>
<option value="client">Client</option>
<option value="vendeur">Vendeur</option>
</select>

<button onclick="register()">Créer mon compte</button>

<p id="msg"></p>

</div>

<script>

// Charger image profil
function loadImage(event){
    let reader = new FileReader();
    reader.onload = function(){
        document.getElementById("preview").src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}

// inscription
function register(){

    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let role = document.getElementById("role").value;
    let photo = document.getElementById("preview").src;

    if(!nom || !email || !password || !role){
        alert("Tous les champs sont obligatoires !");
        return;
    }

    let user = {
        id:Date.now(),
        nom,
        email,
        password,
        role,
        photo,
        panier:[],
        favoris:[],
        commandes:[]
    };

    localStorage.setItem("user_" + email, JSON.stringify(user));

    document.getElementById("msg").innerText =
    "Compte créé avec succès !";

    console.log(user);
}
</script>

</body>
</html>
