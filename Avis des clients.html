Avis 


<section class="reviews-section">
<h2>⭐ Avis et Commentaires</h2>
<div id="reviewsList">
<div class="review-card">
<div class="user-info">
<img src="images/user1.jpg" class="avatar">
<div>
<h4>Patrick M.</h4>
<span>⭐⭐⭐⭐⭐</span>
</div>
</div>
<p>
Très belle robe africaine, tissu de qualité et livraison rapide.
</p>
<div class="seller-reply">
🏪 <strong>Fashion Market :</strong>
Merci pour votre confiance.
</div>
</div>
</div>
<div class="review-form">
<input
type="text"
id="reviewName"
placeholder="Votre nom">
<select id="reviewStars">
<option>⭐⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐</option>
<option>⭐</option>
</select>
<textarea
id="reviewComment"
placeholder="Écrivez votre commentaire">
</textarea>
<button onclick="addReview()">
Publier l'avis
</button>
</div>
</section>
<style>
.reviews-section{
background:white;
margin:20px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
.review-card{
background:#f8f9fa;
padding:15px;
margin-top:15px;
border-radius:15px;
}
.user-info{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}
.seller-reply{
background:#e8f5e9;
padding:10px;
margin-top:10px;
border-left:4px solid #27ae60;
border-radius:8px;
}
.review-form{
margin-top:20px;
}
.review-form input,
.review-form select,
.review-form textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}
.review-form textarea{
height:100px;
resize:none;
}
.review-form button{
margin-top:10px;
padding:12px;
width:100%;
background:#111;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
.review-form button:hover{
background:#333;
}
</style>
<script>
function addReview(){
let nom =
document.getElementById("reviewName").value;
let etoiles =
document.getElementById("reviewStars").value;
let commentaire =
document.getElementById("reviewComment").value;
if(
nom === "" ||
commentaire === ""
){
alert("Veuillez remplir tous les champs.");
return;
}
let reviews =
document.getElementById("reviewsList");
reviews.innerHTML += `
<div class="review-card">
<div class="user-info">
<img
src="images/default-user.jpg"
class="avatar">
<div>
<h4>${nom}</h4>
<span>${etoiles}</span>
</div>
</div>
<p>${commentaire}</p>
<div class="seller-reply">
🏪 <strong>Vendeur :</strong>
Merci pour votre avis.
</div>
</div>
`;
document.getElementById("reviewName").value="";
document.getElementById("reviewComment").value="";
}
</script>
